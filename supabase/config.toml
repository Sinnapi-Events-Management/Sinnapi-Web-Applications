# Sinnapi — Supabase function config.
# verify_jwt = false  -> public endpoint (webhooks / cron, protected by signature
#                        verification or service-role bearer).
# verify_jwt = true   -> requires a valid user JWT (RLS + permissions apply).

[functions.create-payment]
verify_jwt = true

[functions.psp-payout]
verify_jwt = true

[functions.psp-pesapal-webhook]
verify_jwt = false

[functions.psp-paypal-webhook]
verify_jwt = false

[functions.fx-rate-sync]
verify_jwt = false

[functions.notification-dispatch]
verify_jwt = false

[functions.content-moderation]
verify_jwt = false

[functions.subscription-lifecycle]
verify_jwt = false

[functions.payment-reconciliation]
verify_jwt = false

[functions.vendor-application]
verify_jwt = false

[functions.promote-intake]
verify_jwt = true
