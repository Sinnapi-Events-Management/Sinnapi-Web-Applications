<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <!--
      Strict-ish CSP to compensate for browser-stored Supabase sessions (the
      tradeoff of an SPA vs httpOnly-cookie auth). Tighten connect-src to your
      Supabase project URL. In production prefer serving CSP as a real HTTP
      header from your host/CDN rather than a meta tag.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'"
    />
    <title>Sinnapi Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
