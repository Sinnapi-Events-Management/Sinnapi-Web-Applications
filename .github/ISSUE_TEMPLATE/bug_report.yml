name: 🐛 Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more detail you provide, the faster we can fix it.
        If a Jira ticket already exists, link it below.

  - type: input
    id: jira
    attributes:
      label: Jira ticket
      description: Link if one exists (e.g. https://sinnapi.atlassian.net/browse/SNP-123).
      placeholder: SNP-XXX
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which app or package is affected?
      multiple: true
      options:
        - apps/web-public
        - apps/client-portal
        - apps/vendor-portal
        - apps/admin-portal
        - packages/ui
        - supabase (functions / migrations)
        - Not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / recordings
      description: If applicable, add screenshots or a screen recording.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, account/role, and environment (local / staging / prod).
      placeholder: |
        - Environment: staging
        - Browser: Chrome 120
        - Role: vendor
    validations:
      required: false
